<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevConf <br>2026</title>


    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


        body {
            font-family: sans-serif;
            background: #ffffff;
            color: #222;
        }


        .container {
            width: 1100px;
            margin: auto;
        }


        a {
            text-decoration: none;
            color: black;
        }




        nav {
            padding: 20px 0;
        }


        nav .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }


        .logo {
            font-size: 22px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }


        nav ul {
            display: flex;
            gap: 30px;
        }


        nav button {
            padding: 10px 20px;
            background: #2f6df6;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }




        .hero {
            height: 500px;
            background: url("./assets/banner.jpg");
            background-size: cover;
            background-position: center;
            position: relative;
        }


        .overlay {
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .65);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }


        .hero h1 {
            color: white;
            font-size: 58px;
            margin-bottom: 20px;
        }


        .hero p {
            color: #ddd;
            width: 650px;
            margin: auto;
            line-height: 28px;
            margin-bottom: 30px;
        }


        .hero button {
            padding: 14px 30px;
            background: #2f6df6;
            border: none;
            color: white;
            border-radius: 5px;
        }




        
    </style>
</head>

<body>


    <nav>
        <div class="container">


            <div class="logo">
                <img src="./assets/logo.png" alt="" width="40" height="40">
                <div>DEVCONF <br>2026</div>
            </div>


            <ul>
                <li><a href="#">Speakers</a></li>
                <li><a href="#">Schedule</a></li>
                <li><a href="#">Tracks</a></li>
                <li><a href="#">Venue</a></li>
                <li><a href="#">Blog</a></li>
            </ul>


            <button>Register Now</button>


        </div>
    </nav>


    <section class="hero">

        <div class="overlay">
            <div>
                <h1>Code. <i>Connect.</i> Create</h1>
                <p>
                    Join developers, designers and technology enthusiasts for two days
                    of inspiring talks, networking and hands-on learning at DevConf 2026.
                </p>
                <button>Register Now</button>

            </div>
        </div>


    </section>


    


</body>

</html>
